server {
    listen 80;
    server_name artifactory.control-plane-nexus;

    access_log off;
    error_log /var/log/nginx/error.log warn;

    location = /nexus/repository/extensions/com/epam/digital/data/platform/dbchangelog/4.5/dbchangelog-4.5.xsd {
        alias /data/xsd/dbchangelog-4.5.xsd;
    }

    location = /nexus/repository/extensions/com/epam/digital/data/platform/liquibase-ext-schema/latest/liquibase-ext-schema-latest.xsd {
        alias /data/xsd/liquibase-ext-schema-latest.xsd;
    }

    location /admin/api/ {
        resolver ${DNS_SERVER} valid=30s;

        set $rrm_auth_proxy "http://rrm-api-proxy:80";

        include /etc/nginx/cors.conf;

        proxy_pass $rrm_auth_proxy$request_uri;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

}
